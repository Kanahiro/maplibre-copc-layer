name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [labeled]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          show_full_output: true
          claude_args: |
            --append-system-prompt "実装を依頼された場合、コード変更後に必ず Pull Request を作成してください。PR本文には Closes #<Issue番号> を含めてください。GitHub操作にはghコマンドではなくMCPツール(mcp__github__*)を使ってください。"
            --model claude-opus-4-6
            --allowed-tools "mcp__github__create_pull_request,mcp__github__get_pull_request,mcp__github__list_pull_requests,mcp__github__create_issue,mcp__github__get_issue,mcp__github__list_issues,mcp__github__add_issue_comment,mcp__github__create_branch,mcp__github__push_files,mcp__github__search_code,mcp__github__get_file_contents,mcp__github__create_or_update_file,WebFetch,WebSearch"
          additional_permissions: |
            actions: read
