<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COPC Viewer Dev</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    #map { width: 100%; height: 100%; }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-family: system-ui, sans-serif;
      font-size: 14px;
      max-width: 420px;
      width: 90%;
    }
    #controls h3 { margin-bottom: 8px; font-size: 14px; color: #333; }
    #controls input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 6px;
    }
    #controls button {
      width: 100%;
      padding: 6px 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    #controls button:hover { background: #2563eb; }
    #stats {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="controls">
    <h3>COPC Viewer</h3>
    <input id="url-input" type="text" placeholder="Enter COPC file URL (.copc.laz)" />
    <button id="load-btn">Load Point Cloud</button>
    <div id="stats"></div>
  </div>
  <script type="module" src="/dev/main.ts"></script>
</body>
</html>
